name: kafka-workshop-connect

# Two independent single-broker Kafka clusters ("source" and "target") plus one
# Kafka Connect worker running MirrorMaker 2's connectors to replicate topics
# from source -> target. This exercises Connect (5.1) and real cross-cluster
# mirroring (5.2) with the same stack, using only what ships in the base
# cp-kafka-connect image (org.apache.kafka.connect.mirror.*) — no extra plugin
# installation required. See CONNECT.md for how to drive it.

services:
  zookeeper-source:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper-source
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/2181' >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka-source:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka-source
    depends_on:
      zookeeper-source:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper-source:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-source:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10

  zookeeper-target:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper-target
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/2181' >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka-target:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka-target
    depends_on:
      zookeeper-target:
        condition: service_healthy
    ports:
      - "9096:9096"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper-target:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9096
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-target:29092,PLAINTEXT_HOST://localhost:9096
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9096 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10

  connect:
    image: confluentinc/cp-kafka-connect:7.6.1
    container_name: connect
    depends_on:
      kafka-source:
        condition: service_healthy
      kafka-target:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      # The worker's OWN config/offset/status topics live on the target cluster —
      # a common MM2 convention, independent of which clusters a given connector
      # replicates between.
      CONNECT_BOOTSTRAP_SERVERS: kafka-target:29092
      CONNECT_REST_ADVERTISED_HOST_NAME: connect
      CONNECT_REST_PORT: 8083
      CONNECT_GROUP_ID: workshop-mm2
      CONNECT_CONFIG_STORAGE_TOPIC: mm2-configs
      CONNECT_OFFSET_STORAGE_TOPIC: mm2-offsets
      CONNECT_STATUS_STORAGE_TOPIC: mm2-status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.converters.ByteArrayConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.converters.ByteArrayConverter
      CONNECT_INTERNAL_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_INTERNAL_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/confluent-hub-components
      CONNECT_LOG4J_ROOT_LOGLEVEL: INFO
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/connectors >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 15

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui-connect
    depends_on:
      connect:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: source
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-source:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper-source:2181
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: connect
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://connect:8083
      KAFKA_CLUSTERS_1_NAME: target
      KAFKA_CLUSTERS_1_BOOTSTRAPSERVERS: kafka-target:29092
      KAFKA_CLUSTERS_1_ZOOKEEPER: zookeeper-target:2181

networks:
  default:
    ipam:
      config:
        - subnet: 172.30.0.0/24
